services:
  api:
    build: .
    image: gridlock-api:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - INFERENCE_MODE=real
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
